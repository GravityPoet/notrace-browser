<!doctype html>
<meta charset="utf-8">
<title>Cloak self-test probe</title>
<!--
  Self-contained fingerprint probe. Defines window.__runProbe() returning a
  Promise<result>. Driven headfully over CDP by run-selftest.mjs; also openable
  by hand for a quick eyeball. The worker-timezone check is the one that caught
  the JS-only spoof leak: a Web Worker reads its own Intl zone, which a page-world
  spoof cannot reach — only the TZ env var (engine level) makes it match.
-->
<pre id="out">running…</pre>
<script>
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(label + " timeout")), ms))
  ]);
}

window.__runProbe = function () {
  const out = { ts: Date.now() };
  const nav = navigator;
  return withTimeout((async function () {

  out.webdriver = nav.webdriver === true;              // true == BAD
  out.userAgent = nav.userAgent;
  out.platform = nav.platform;
  out.languages = nav.languages;
  out.hardwareConcurrency = nav.hardwareConcurrency;
  out.deviceMemory = (typeof nav.deviceMemory !== "undefined") ? nav.deviceMemory : null;
  out.headless_apis = {
    contentIndex: typeof window.ContentIndex !== "undefined",
    contacts: "contacts" in nav,
    downlinkMax: !!(nav.connection && "downlinkMax" in nav.connection),
    webdriverDescriptor: (() => {
      try {
        const d = Object.getOwnPropertyDescriptor(Navigator.prototype, "webdriver");
        return d && typeof d.get === "function" ? d.get.call(nav) : nav.webdriver;
      } catch (e) {
        return "ERR:" + e;
      }
    })()
  };
  out.screen = {
    width: screen.width,
    height: screen.height,
    availWidth: screen.availWidth,
    availHeight: screen.availHeight,
    colorDepth: screen.colorDepth,
    pixelDepth: screen.pixelDepth,
    devicePixelRatio: window.devicePixelRatio
  };
  try {
    out.fonts = {
      menlo: !!(document.fonts && document.fonts.check('12px "Menlo"')),
      helveticaNeue: !!(document.fonts && document.fonts.check('12px "Helvetica Neue"')),
      sfPro: !!(document.fonts && document.fonts.check('12px "SF Pro Text"'))
    };
  } catch (e) { out.fonts = { error: String(e) }; }
  out.plugins = Array.from(nav.plugins || []).map((p) => p.name);
  out.cloak = {
    accountSeed: window.__cloakAccountSeed || "",
    fingerprintInstalled: window.__cloakFingerprintInstalled === true,
    spoofType: typeof window.__cloakSpoof
  };

  // Browser-visible public IP. When --proxy-server is active, this must match
  // the account proxy's preflight IP; otherwise the browser is not using the
  // same network path as the launcher checks.
  try {
    const ac = new AbortController();
    const timer = setTimeout(() => ac.abort(), 5000);
    const r = await withTimeout(
      fetch("https://api.ipify.org?format=json", { cache: "no-store", signal: ac.signal }),
      5000,
      "fetch ip"
    );
    clearTimeout(timer);
    const j = await r.json();
    out.fetch_ip = j && j.ip ? j.ip : "";
  } catch (e) { out.fetch_ip = "ERR:" + e; }

  // High-entropy client hints (the UA-CH side; honest-Mac should read macOS).
  try {
    out.uaData = nav.userAgentData
      ? await withTimeout(nav.userAgentData.getHighEntropyValues(
          ["platform", "platformVersion", "architecture", "bitness", "model", "uaFullVersion"]), 5000, "uaData")
      : null;
  } catch (e) { out.uaData = { error: String(e) }; }

  // Timezone — main thread.
  out.main_tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  out.main_offset = new Date().getTimezoneOffset();

  // Timezone — Web Worker (separate JS global; page-world spoof cannot reach it).
  out.worker_tz = await withTimeout(new Promise((res) => {
    try {
      const code = "self.onmessage=function(){try{postMessage(Intl.DateTimeFormat().resolvedOptions().timeZone)}catch(e){postMessage('ERR:'+e)}}";
      const w = new Worker(URL.createObjectURL(new Blob([code], { type: "text/javascript" })));
      const t = setTimeout(() => res("TIMEOUT"), 2500);
      w.onmessage = (ev) => { clearTimeout(t); res(ev.data); try { w.terminate(); } catch (_) {} };
      w.postMessage(1);
    } catch (e) { res("ERR:" + e); }
  }), 4000, "worker timezone").catch((e) => "ERR:" + e);

  // WebGL unmasked vendor/renderer (honest-Mac => Apple/ANGLE).
  try {
    const gl = document.createElement("canvas").getContext("webgl")
            || document.createElement("canvas").getContext("experimental-webgl");
    const dbg = gl.getExtension("WEBGL_debug_renderer_info");
    out.webgl_vendor = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
    out.webgl_renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
  } catch (e) { out.webgl_vendor = out.webgl_renderer = "ERR:" + e; }

  // Canvas hash — varies with the per-account --fingerprint seed.
  try {
    const c = document.createElement("canvas"); c.width = 220; c.height = 50;
    const ctx = c.getContext("2d");
    ctx.textBaseline = "top"; ctx.font = "14px Arial";
    ctx.fillStyle = "#069"; ctx.fillText("Cloak self-test 0123!@#", 2, 2);
    ctx.fillStyle = "rgba(102,200,0,0.55)"; ctx.fillRect(10, 12, 120, 22);
    const pixels = ctx.getImageData(0, 0, c.width, c.height).data;
    let ph = 0; for (let i = 0; i < pixels.length; i += 113) ph = (ph * 33 + pixels[i]) >>> 0;
    out.image_data_hash = ph.toString(16);
    const data = c.toDataURL();
    let h = 0; for (let i = 0; i < data.length; i++) h = (h * 31 + data.charCodeAt(i)) >>> 0;
    out.canvas_hash = h.toString(16);
  } catch (e) { out.canvas_hash = "ERR:" + e; }

  // Audio hash — catches whether the per-seed audio surface changes too.
  try {
    const AC = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    const ac = new AC(1, 5000, 44100);
    const osc = ac.createOscillator();
    const comp = ac.createDynamicsCompressor();
    osc.type = "triangle";
    osc.frequency.value = 1000;
    comp.threshold.value = -50;
    comp.knee.value = 40;
    comp.ratio.value = 12;
    comp.attack.value = 0;
    comp.release.value = 0.25;
    osc.connect(comp);
    comp.connect(ac.destination);
    osc.start(0);
    const buf = await withTimeout(ac.startRendering(), 5000, "audio");
    const data = buf.getChannelData(0);
    let h = 0;
    for (let i = 0; i < data.length; i += 97) {
      h = (h * 131 + Math.floor((data[i] + 1) * 1000000)) >>> 0;
    }
    out.audio_hash = h.toString(16);
  } catch (e) { out.audio_hash = "ERR:" + e; }

  // WebRTC — collect ICE candidate IPs; any RFC1918/host IP here is a leak.
  out.webrtc_ips = await withTimeout(new Promise((res) => {
    const ips = new Set();
    try {
      const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
      pc.createDataChannel("x");
      pc.onicecandidate = (e) => {
        if (!e || !e.candidate || !e.candidate.candidate) return;
        const m = /([0-9]{1,3}(?:\.[0-9]{1,3}){3})|([a-f0-9]{1,4}(?::[a-f0-9]{1,4}){2,7})/i.exec(e.candidate.candidate);
        if (m) ips.add(m[0]);
      };
      pc.createOffer().then((o) => pc.setLocalDescription(o)).catch(() => {});
      setTimeout(() => { res([...ips]); try { pc.close(); } catch (_) {} }, 2500);
    } catch (e) { res(["ERR:" + e]); }
  }), 4000, "webrtc").catch((e) => ["ERR:" + e]);

  window.__PROBE = out;
  out.probe_done = true;
  try { document.getElementById("out").textContent = JSON.stringify(out, null, 2); } catch (_) {}
  return out;
  })(), 15000, "probe").catch((e) => {
    out.probe_error = String(e);
    out.probe_done = true;
    window.__PROBE = out;
    try { document.getElementById("out").textContent = JSON.stringify(out, null, 2); } catch (_) {}
    return out;
  });
};
</script>
